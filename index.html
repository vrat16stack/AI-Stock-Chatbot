<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio AI — Stock Analyst Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10; --bg2: #111318; --bg3: #181c24; --border: #1e2330; --border2: #252d3d;
      --accent: #00d4aa; --accent2: #0099ff; --accent3: #ff6b35; --bull: #00c896;
      --bear: #ff4560; --neutral: #ffc107; --hold: #7c83fd; --text: #e8eaf0;
      --text2: #8892a4; --text3: #4a5568; --card: #13171f; --card2: #1a1f2e;
      --radius: 12px; --font-mono: 'Space Mono', monospace; --font-body: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .msg.user { align-self: flex-end; max-width: 80%; }
    .msg.user .msg-bubble { background: var(--bg3); border: 1px solid var(--border2); padding: 12px 16px; border-radius: 16px 16px 0 16px; }
    .msg.bot { align-self: flex-start; width: 100%; }
    .analysis-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 100%; max-width: 700px; }
    .card-header { display: flex; justify-content: space-between; padding: 15px; background: var(--card2); border-bottom: 1px solid var(--border); }
    .verdict-box { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .verdict-decision { font-family: var(--font-mono); font-size: 26px; font-weight: 700; letter-spacing: -1px; }
    .BUY { color: var(--bull); } .HOLD { color: var(--hold); } .WAIT { color: var(--accent3); }
    .ai-reasoning { font-size: 14px; line-height: 1.7; color: var(--text); }
    .input-area { padding: 20px; background: var(--bg2); border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 12px; max-width: 1000px; margin: 0 auto; width: 100%; }
    #userInput { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 12px; color: white; resize: none; font-family: var(--font-body); outline: none; }
    #userInput:focus { border-color: var(--accent); }
    .send-btn { background: var(--accent); border: none; padding: 0 25px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .send-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .thinking { font-family: var(--font-mono); font-size: 11px; color: var(--accent); padding: 10px; }
  </style>
</head>
<body>

<div class="topbar">
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="logo-dot"></div>
    <div style="font-family:var(--font-mono); font-weight:700; letter-spacing: 1px;">PORTFOLIO AI</div>
  </div>
  <button onclick="location.reload()" style="background:transparent; color:var(--text2); border:1px solid var(--border); padding:5px 12px; border-radius:5px; cursor:pointer; font-size:11px;">RESET SESSION</button>
</div>

<div class="main">
  <div class="sidebar">
    <div style="padding:15px; font-size:10px; color:var(--text3); letter-spacing: 1px; font-weight:700;">ACTIVE TICKERS</div>
    <div id="sidebarList" style="padding:10px;"></div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
        <div id="welcome" style="text-align:center; padding:60px 20px; color:var(--text3);">
            <div style="font-size: 48px; margin-bottom: 20px;">📈</div>
            <h2 style="color: var(--text); margin-bottom: 8px;">Market Intelligence Terminal</h2>
            <p>Enter any NSE Stock name to begin real-time analysis.</p>
        </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Search stock (e.g. Reliance, SBI, Tata Motors)..."></textarea>
        <button class="send-btn" id="sendBtn" onclick="handleSend()">ANALYZE</button>
      </div>
    </div>
  </div>
</div>

<script>
const GROQ_API_KEY = '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'; // <--- PASTE KEY HERE
const GROQ_MODEL   = 'llama-3.3-70b-versatile';

async function fetchStockData(ticker) {
  // Using a CORS proxy to fetch Yahoo Finance data directly from browser
  const proxy = "https://api.allorigins.win/get?url=";
  const target = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}.NS?interval=1d&range=1mo`);
  const resp = await fetch(proxy + target);
  const json = await resp.json();
  const data = JSON.parse(json.contents);
  if (data?.chart?.result?.[0]) return data.chart.result[0];
  throw new Error('Stock not found');
}

async function callGroq(messages) {
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
      body: JSON.stringify({ model: GROQ_MODEL, messages, temperature: 0.3 })
  });
  const data = await resp.json();
  return data.choices[0].message.content;
}

function extractTicker(text) {
  const mapping = { "SBI": "SBIN", "RELIANCE": "RELIANCE", "TATA MOTOR": "TATAMOTORS", "TATA STEEL": "TATASTEEL" };
  const words = text.toUpperCase().split(/\s+/);
  for(let key in mapping) { if(text.toUpperCase().includes(key)) return mapping[key]; }
  const stopwords = ["SHOULD", "I", "INVEST", "IN", "BUY", "SELL", "KYA", "KAREN", "BATAO", "ABOUT", "PRICE", "OF"];
  return words.find(w => !stopwords.includes(w) && w.length > 2) || words[0];
}

async function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || GROQ_API_KEY === 'YOUR_GROQ_API_KEY') {
    if(GROQ_API_KEY === 'YOUR_GROQ_API_KEY') alert("Please paste your Groq API Key in the code!");
    return;
  }
  
  if(document.getElementById('welcome')) document.getElementById('welcome').remove();
  input.value = '';
  appendMsg('user', text);
  const thinking = appendThinking("Searching NSE Databases...");

  const ticker = extractTicker(text);
  
  try {
    const chart = await fetchStockData(ticker);
    const meta = chart.meta;
    const price = meta.regularMarketPrice;
    
    thinking.innerText = "Consulting AI Strategist...";
    
    const prompt = `Analyze ${ticker} stock. Current Price: ₹${price}. User asks: "${text}". Provide a deep-dive technical and sentimental analysis in professional Hinglish. Explain specific levels if possible. End with a clear VERDICT: [BUY], [HOLD], or [WAIT] in bold uppercase.`;
    
    const aiResp = await callGroq([
      {role:'system', content:'You are a premium Indian Stock Market Analyst known for detailed Hinglish reports.'},
      {role:'user', content:prompt}
    ]);
    
    thinking.remove();
    const verdict = aiResp.includes('BUY') ? 'BUY' : aiResp.includes('WAIT') ? 'WAIT' : 'HOLD';
    
    const cardHtml = `
      <div class="analysis-card">
        <div class="card-header">
          <div><b style="font-size:16px; color:var(--accent);">${ticker}.NS</b></div>
          <div style="text-align:right;"><b>₹${price.toLocaleString('en-IN')}</b></div>
        </div>
        <div class="verdict-box">
          <div class="verdict-decision ${verdict}">${verdict}</div>
          <div class="ai-reasoning">${aiResp.replace(/\n/g, '<br>')}</div>
        </div>
      </div>`;
    
    appendMsg('bot-card', cardHtml);
    updateHistory(ticker);

  } catch(e) {
    thinking.innerText = "Processing general query...";
    const genResp = await callGroq([
        {role:'system', content:'You are a helpful stock market assistant. Answer the user query clearly.'},
        {role:'user', content:text}
    ]);
    thinking.remove();
    appendMsg('bot-text', `<div style="background:var(--bg3); padding:15px; border-radius:12px; line-height:1.6;">${genResp.replace(/\n/g,'<br>')}</div>`);
  }
}

function appendMsg(type, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type.includes('user') ? 'user' : 'bot'}`;
  div.innerHTML = content.includes('<div') ? content : `<div class="msg-bubble">${content}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendThinking(txt) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="thinking">> ${txt}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.thinking');
}

function updateHistory(ticker) {
    const list = document.getElementById('sidebarList');
    if ([...list.children].some(el => el.innerText === ticker)) return;
    const item = document.createElement('div');
    item.style.padding = "8px 12px";
    item.style.marginBottom = "4px";
    item.style.background = "var(--bg3)";
    item.style.borderRadius = "6px";
    item.style.fontSize = "12px";
    item.style.color = "var(--accent)";
    item.style.fontFamily = "var(--font-mono)";
    item.innerText = ticker;
    list.prepend(item);
}

document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
</script>
</body>
</html>
