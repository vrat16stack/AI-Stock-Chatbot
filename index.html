<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio AI — Market Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #00f2ff;
            --bull: #3fb950;
            --bear: #f85149;
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg);
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* Sidebar - Simple & Dark */
        .sidebar {
            width: 240px; 
            background: #000000;
            border-right: 1px solid var(--border);
            display: flex; 
            flex-direction: column;
            z-index: 10;
        }
        .sidebar-header { padding: 30px 20px; font-weight: 700; letter-spacing: 2px; color: var(--accent); font-size: 12px; }
        .history-item { 
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #0f172a;
            transition: 0.3s; font-size: 13px; color: var(--text-secondary);
        }
        .history-item:hover { color: var(--accent); background: #0f172a; }

        /* Main Stream Area */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px 10%; /* More breathing room */
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
        }

        /* User Message - Clean text on the right */
        .msg.user {
            align-self: flex-end;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: right;
            max-width: 80%;
            border-right: 2px solid var(--accent);
            padding-right: 15px;
        }

        /* Bot Analysis - Full Width Stream */
        .analysis-stream {
            align-self: flex-start;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
            border-left: 1px solid var(--border);
            padding-left: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .ticker-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .ticker-name { font-size: 32px; font-weight: 800; font-family: 'JetBrains Mono'; color: #ffffff; }
        .price-val { font-size: 24px; font-weight: 700; color: var(--bull); }

        .verdict-tag { 
            display: inline-block; padding: 4px 12px; border-radius: 4px; 
            font-weight: 800; font-size: 11px; margin-bottom: 15px;
        }
        .BUY { background: #3fb95033; color: var(--bull); }
        .WAIT { background: #ffbc0033; color: #ffbc00; }
        .HOLD { background: #00f2ff33; color: var(--accent); }

        /* THE FIX: Explicit white text, no boxes to clip it */
        .reasoning-text { 
            line-height: 1.8; 
            color: #f0f6fc !important; 
            font-size: 16px; 
            margin-bottom: 30px;
            white-space: pre-wrap;
            display: block;
        }

        /* Table - Sleek & Full Width */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th { text-align: left; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
        .data-table td { padding: 15px 12px; border-bottom: 1px solid #0f172a; font-size: 14px; color: #f0f6fc; }

        /* Input Area - Fixed at bottom */
        .input-wrapper { 
            padding: 30px 10%; 
            display: flex; 
            gap: 20px; 
            background: #000000;
            border-top: 1px solid var(--border);
        }
        #userInput {
            flex: 1; background: transparent; border: none;
            color: white; outline: none; font-size: 16px;
            font-family: inherit; resize: none;
        }
        .send-btn {
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 10px 25px; border-radius: 4px; font-weight: 700;
            cursor: pointer; transition: 0.3s; font-family: 'JetBrains Mono';
        }
        .send-btn:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">STOCKS.EXE</div>
    <div id="sidebarList"></div>
</div>

<div class="chat-container">
    <div class="messages" id="messages">
        <div id="welcome" style="margin-top: 10vh; color: var(--text-secondary);">
            <h1 style="color: white; font-size: 40px; margin-bottom: 10px;">Market Intelligence</h1>
            <p>> System ready. Enter ticker or query to begin analysis.</p>
        </div>
    </div>

    <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="Search NSE..."></textarea>
        <button class="send-btn" onclick="handleSend()">RUN ANALYSIS</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://ai-stock-chatbot.onrender.com/analyze";

    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        if(document.getElementById('welcome')) document.getElementById('welcome').remove();

        input.value = '';
        appendUserMsg(text);
        const thinking = appendThinking("INITIALIZING API FETCH...");

        try {
            const response = await fetch(RENDER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const result = await response.json();
            thinking.remove();

            if (result.error) throw new Error(result.error);

            renderAnalysis(result);
            updateHistory(result.ticker);

        } catch (e) {
            thinking.innerHTML = `<div style="color:var(--bear); font-size:12px;">[ERROR]: ${e.message}</div>`;
        }
    }

    function renderAnalysis(data) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'analysis-stream';
        
        const historyRows = (data.history || []).map(y => `
            <tr>
                <td>${y.year}</td>
                <td>₹${y.high}</td>
                <td>₹${y.low}</td>
                <td style="color:${y.change > 0 ? 'var(--bull)' : 'var(--bear)'}">${y.change}%</td>
            </tr>`).join('');

        div.innerHTML = `
            <div class="ticker-row">
                <span class="ticker-name">${data.ticker}</span>
                <span class="price-val">₹${data.currentPrice}</span>
            </div>
            <div class="verdict-tag ${data.verdict}">${data.verdict}</div>
            <div class="reasoning-text">${data.reasoning}</div>
            <table class="data-table">
                <thead><tr><th>Year</th><th>High</th><th>Low</th><th>Return</th></tr></thead>
                <tbody>${historyRows}</tbody>
            </table>
        `;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function appendUserMsg(text) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'msg user';
        div.innerText = `> ${text}`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function appendThinking(txt) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.style.color = "var(--text-secondary)";
        div.style.fontSize = "12px";
        div.style.fontFamily = "JetBrains Mono";
        div.innerText = `[SYSTEM]: ${txt}`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
    }

    function updateHistory(ticker) {
        const list = document.getElementById('sidebarList');
        if ([...list.children].some(el => el.innerText === ticker)) return;
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = ticker;
        list.prepend(item);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            handleSend(); 
        } 
    });
</script>
</body>
</html>
