<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio AI — Premium Stock Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #161b22; /* Solid GitHub-dark blue */
            --header-bg: #21262d;
            --accent: #00f2ff;
            --bull: #3fb950;
            --bear: #f85149;
            --text: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a2333 0%, #05070a 100%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px; 
            background: rgba(0, 0, 0, 0.8);
            border-right: 1px solid var(--border);
            display: flex; 
            flex-direction: column;
        }
        .sidebar-header { padding: 25px; font-weight: 700; letter-spacing: 2px; color: var(--accent); font-size: 14px; }
        .history-item { 
            padding: 12px 25px; cursor: pointer; border-bottom: 1px solid var(--border);
            transition: 0.3s; font-size: 13px; color: var(--text-dim);
        }

        /* Main Chat Area */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: transparent; }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }

        /* Message Bubbles */
        .msg.user {
            align-self: flex-end;
            background: #1e293b;
            color: white !important;
            padding: 12px 20px;
            border-radius: 16px 16px 0 16px;
            max-width: 80%;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        /* Analysis Card (The Bot Response) */
        .analysis-card {
            background: var(--card-bg) !important;
            border: 1px solid var(--accent);
            border-radius: 12px;
            width: 100%;
            max-width: 750px;
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { 
            padding: 20px; 
            background: var(--header-bg); 
            border-bottom: 1px solid var(--border);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .ticker-name { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono'; color: #58a6ff !important; }
        .price-tag { font-size: 20px; font-weight: 700; color: var(--bull) !important; }

        .verdict-area { padding: 20px; background: var(--card-bg); }
        .verdict-badge { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            font-weight: 800; font-size: 12px; margin-bottom: 15px; text-transform: uppercase;
        }
        .BUY { background: rgba(63, 185, 80, 0.2); color: var(--bull); border: 1px solid var(--bull); }
        .WAIT { background: rgba(255, 188, 0, 0.2); color: #ffbc00; border: 1px solid #ffbc00; }
        .HOLD { background: rgba(0, 242, 255, 0.2); color: var(--accent); border: 1px solid var(--accent); }

        .analysis-text { 
            line-height: 1.8; 
            color: #f0f6fc !important; 
            font-size: 15px; 
            margin-bottom: 20px;
            white-space: pre-wrap;
            display: block !important;
        }

        .table-container { background: #0d1117; border-radius: 8px; padding: 10px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th { text-align: left; color: var(--text-dim); padding: 10px; border-bottom: 1px solid var(--border); font-size: 11px; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #f0f6fc; }

        /* Input Area */
        .input-wrapper { 
            padding: 30px; 
            display: flex; 
            gap: 15px; 
            background: linear-gradient(transparent, var(--bg));
        }
        #userInput {
            flex: 1; background: #1e293b; border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; color: white; outline: none;
            font-family: inherit; resize: none;
        }
        .send-btn {
            background: var(--accent); color: #000; border: none;
            padding: 0 30px; border-radius: 12px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">PORTFOLIO AI</div>
    <div id="sidebarList"></div>
</div>

<div class="chat-container">
    <div class="messages" id="messages">
        <div id="welcomeScreen" style="margin: auto; text-align: center; max-width: 450px;">
            <h1 style="font-size: 36px; margin-bottom: 15px; color: var(--accent);">Market Intelligence</h1>
            <p style="color: var(--text-dim); line-height: 1.6;">Analyze any NSE stock with live technicals and AI-driven insights. Try "Analyze SBIN" or "Reliance kaisa hai?".</p>
        </div>
    </div>

    <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="Type message..."></textarea>
        <button class="send-btn" onclick="handleSend()">ANALYZE</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://ai-stock-chatbot.onrender.com/analyze";

    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        const welcome = document.getElementById('welcomeScreen');
        if(welcome) welcome.style.display = 'none';

        input.value = '';
        appendMsg('user', text);
        const thinking = appendThinking("Consulting NSE & Groq AI...");

        try {
            const response = await fetch(RENDER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) throw new Error(`Server Status: ${response.status}`);
            
            const result = await response.json();
            thinking.remove();

            if (result.error) throw new Error(result.error);

            renderCard(result);
            updateHistory(result.ticker);

        } catch (e) {
            thinking.innerHTML = `<div style="color:var(--bear); font-size:12px; font-family: 'JetBrains Mono';">Error: ${e.message}. (Server might be waking up, try again)</div>`;
        }
    }

    function renderCard(data) {
        const msgs = document.getElementById('messages');
        const card = document.createElement('div');
        card.className = 'analysis-card';
        
        // Ensure reasoning exists and isn't a "ghost"
        const cleanReasoning = data.reasoning ? data.reasoning : "Analysis results pending...";

        const historyRows = data.history && data.history.length > 0 
            ? data.history.map(y => `
                <tr>
                    <td><b>${y.year}</b></td>
                    <td>₹${y.high}</td>
                    <td>₹${y.low}</td>
                    <td style="color:${y.change > 0 ? 'var(--bull)' : 'var(--bear)'}">${y.change}%</td>
                </tr>`).join('')
            : '<tr><td colspan="4" style="text-align:center">Data processing...</td></tr>';

        card.innerHTML = `
            <div class="card-header">
                <div>
                    <div class="ticker-name">${data.ticker}</div>
                    <div style="font-size:10px; color:var(--text-dim); letter-spacing:1px;">NSE INDIA | AI INSIGHT</div>
                </div>
                <div style="text-align:right">
                    <div class="price-tag">₹${data.currentPrice}</div>
                    <div style="font-size:10px; color:var(--text-dim)">CMP</div>
                </div>
            </div>
            <div class="verdict-area">
                <div class="verdict-badge ${data.verdict}">${data.verdict}</div>
                <div class="analysis-text">${cleanReasoning}</div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>YEAR</th><th>HIGH</th><th>LOW</th><th>RETURN</th></tr></thead>
                        <tbody>${historyRows}</tbody>
                    </table>
                </div>
            </div>
        `;
        msgs.appendChild(card);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function appendMsg(type, text) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function appendThinking(txt) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.style.color = "var(--accent)";
        div.style.fontSize = "12px";
        div.style.fontFamily = "JetBrains Mono";
        div.innerText = `> ${txt}`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
    }

    function updateHistory(ticker) {
        const list = document.getElementById('sidebarList');
        if ([...list.children].some(el => el.innerText === ticker)) return;
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = ticker;
        list.prepend(item);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            handleSend(); 
        } 
    });
</script>
</body>
</html>
