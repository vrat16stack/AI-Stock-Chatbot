<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio AI — Premium Stock Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(17, 25, 40, 0.75);
            --accent: #00f2ff;
            --bull: #00ffbd;
            --bear: #ff4d6d;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a2333 0%, #05070a 100%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px; 
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border);
            display: flex; 
            flex-direction: column;
        }
        .sidebar-header { padding: 25px; font-weight: 700; letter-spacing: 2px; color: var(--accent); font-size: 14px; }
        .history-item { 
            padding: 12px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.3s; font-size: 13px; color: var(--text-dim);
        }
        .history-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }

        /* Main Chat Area */
        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        /* Analysis Card - Restored exactly to Morning UI */
        .analysis-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
            margin-bottom: 10px;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { 
            padding: 20px; 
            background: rgba(255,255,255,0.03); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .ticker-name { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono'; color: white; }
        .price-tag { font-size: 20px; font-weight: 700; color: var(--accent); }

        .verdict-area { padding: 20px; border-top: 1px solid var(--border); }
        .verdict-badge { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            font-weight: 800; font-size: 12px; margin-bottom: 15px; text-transform: uppercase;
        }
        .BUY { background: rgba(0, 255, 189, 0.15); color: var(--bull); border: 1px solid var(--bull); }
        .WAIT { background: rgba(255, 188, 0, 0.15); color: #ffbc00; border: 1px solid #ffbc00; }
        .HOLD { background: rgba(0, 242, 255, 0.15); color: var(--accent); border: 1px solid var(--accent); }

        /* The Analysis Text - Solid White for visibility */
        .analysis-text { 
            line-height: 1.7; 
            color: #ffffff !important; 
            font-size: 14px; 
            font-weight: 400;
            white-space: pre-wrap;
            display: block;
        }

        /* Input Area */
        .input-wrapper { 
            padding: 30px; 
            background: transparent; 
            display: flex; 
            gap: 15px; 
            align-items: center;
        }
        #userInput {
            flex: 1; 
            background: var(--card-bg); 
            border: 1px solid var(--border);
            border-radius: 12px; 
            padding: 15px; 
            color: white; 
            outline: none;
            font-family: inherit; 
            resize: none;
        }
        .send-btn {
            background: var(--accent); 
            color: #000; 
            border: none;
            padding: 15px 25px; 
            border-radius: 12px; 
            font-weight: 700;
            cursor: pointer; 
            transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">PORTFOLIO AI</div>
    <div id="sidebarList"></div>
</div>

<div class="chat-container">
    <div class="messages" id="messages">
        <div id="welcome" style="margin: auto; text-align: center; max-width: 400px;">
            <h1 style="font-size: 32px; margin-bottom: 10px;">Market Intelligence</h1>
            <p style="color: var(--text-dim);">Analyze any NSE stock with live technicals and AI-driven insights.</p>
        </div>
    </div>

    <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="Search stock (e.g. 'Analyze Reliance')"></textarea>
        <button class="send-btn" onclick="handleSend()">ANALYZE</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://ai-stock-chatbot.onrender.com/analyze";

    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        if(document.getElementById('welcome')) document.getElementById('welcome').remove();

        input.value = '';
        appendMsg('user', text);
        const thinking = appendThinking("Crunching market data...");

        try {
            const response = await fetch(RENDER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) throw new Error(`Server Status: ${response.status}`);
            
            const result = await response.json();
            thinking.remove();

            if (result.error) throw new Error(result.error);

            renderCard(result);
            updateHistory(result.ticker);

        } catch (e) {
            thinking.innerHTML = `<span style="color:var(--bear)">Error: ${e.message}</span>`;
        }
    }

    function renderCard(data) {
        const msgs = document.getElementById('messages');
        const card = document.createElement('div');
        card.className = 'analysis-card';

        card.innerHTML = `
            <div class="card-header">
                <div>
                    <div class="ticker-name">${data.ticker}</div>
                    <div style="font-size:11px; color:var(--text-dim)">NSE INDIA | LIVE REPORT</div>
                </div>
                <div style="text-align:right">
                    <div class="price-tag">₹${data.currentPrice}</div>
                    <div style="font-size:11px; color:var(--text-dim)">CMP</div>
                </div>
            </div>
            <div class="verdict-area">
                <div class="verdict-badge ${data.verdict}">${data.verdict}</div>
                <div class="analysis-text">${data.reasoning}</div>
            </div>
        `;
        msgs.appendChild(card);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function appendMsg(type, text) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        if(type === 'user') {
            div.style.alignSelf = 'flex-end';
            div.innerHTML = `<div style="background:rgba(255,255,255,0.1); padding:10px 18px; border-radius:12px; font-size:14px; margin-bottom:10px;">${text}</div>`;
        }
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function appendThinking(txt) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.style.fontSize = "12px";
        div.style.color = "var(--accent)";
        div.style.fontFamily = "JetBrains Mono";
        div.innerText = `> ${txt}`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
    }

    function updateHistory(ticker) {
        const list = document.getElementById('sidebarList');
        if ([...list.children].some(el => el.innerText === ticker)) return;
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = ticker;
        list.prepend(item);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            handleSend(); 
        } 
    });
</script>
</body>
</html>
